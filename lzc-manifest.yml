application:
  subdomain: tailscale
  background_task: true
  public_path:
    - /
  upstreams:
    - location: /
      backend: http://host.lzcapp:59527
services:
  tailscale:
    # tailscale/tailscale:v1.98.4
    # upstream: docker.io/tailscale/tailscale:v1.98.9
    image: registry.lazycat.cloud/czyt/tailscale/tailscale:730dfb3a2c133156
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTHKEY={{ .U.ts_auth_key }}
      - TS_HOSTNAME={{ .U.ts_hostname }}
      - TS_EXTRA_ARGS={{ .U.ts_extra_args }}
      - TS_USERSPACE=0
    entrypoint: ""
    command: /lzcapp/pkg/content/run.sh
    binds:
      - /lzcapp/var/data:/var/lib
    network_mode: host
    netadmin: true
    healthcheck:
      test:
        - CMD-SHELL
        - tailscale status --peers=false --json | grep -q 'Online.*true'
      start_period: 90s
